name: Build dashboard
on:
  schedule:
    # Saturdays after parkrun results publish. Multiple attempts improve the
    # chance of landing on a GitHub runner that parkrun allows through.
    - cron: '0 12 * * 6'
    - cron: '0 13 * * 6'
    - cron: '0 15 * * 6'
    - cron: '0 18 * * 6'
  workflow_dispatch:   # manual trigger from the Actions tab
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install curl_cffi
      - name: Build dashboard
        env:
          PARKRUN_USERNAME: ${{ secrets.PARKRUN_USERNAME }}
          PARKRUN_PASSWORD: ${{ secrets.PARKRUN_PASSWORD }}
        run: python scripts/build.py
      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          if ! git diff --staged --quiet; then
            git commit -m "chore: weekly dashboard update"
            git push
          else
            echo "No changes to commit."
          fi
